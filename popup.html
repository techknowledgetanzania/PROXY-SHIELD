<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ProxyShield</title>
  <!-- FIX 6: fonts served locally — no Google Fonts network request -->
  <link rel="stylesheet" href="fonts/fonts.css" />
  <style>
    :root {
      --bg:         #0a0c10; --surface:  #111318; --surface2: #181c24;
      --border:     #1e2330; --border2:  #2a3045;
      --accent:     #00c896; --accent-d: #00c89620; --accent-g: #00c89640;
      --danger:     #ff4757;
      --text:       #e8eaf0; --muted:    #6b7590;  --dim:      #3d4560;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
      --r: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); width: 380px; min-height: 520px; }

    /* Header */
    .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: relative; }
    .hdr::after { content:''; position: absolute; bottom:-1px; left:20px; width:40px; height:1px; background:var(--accent); }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-icon { width:32px; height:32px; background:var(--accent-d); border:1px solid var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .brand-name { font-size:15px; font-weight:700; }
    .brand-tag  { font-size:9px; font-weight:500; letter-spacing:.12em; color:var(--accent); text-transform:uppercase; margin-top:1px; }

    /* Toggle */
    .tw { display:flex; align-items:center; gap:8px; }
    .tl { font-size:11px; font-weight:500; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; min-width:22px; }
    /* FIX 6: proper accessible toggle — input is visually hidden but keyboard-focusable */
    .toggle { position:relative; width:44px; height:24px; }
    .toggle input { position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer; z-index:1; }
    .track { position:absolute; inset:0; background:var(--surface2); border:1px solid var(--border2); border-radius:24px; transition:all .25s; pointer-events:none; }
    .thumb { position:absolute; top:3px; left:3px; width:16px; height:16px; background:var(--muted); border-radius:50%; transition:all .25s cubic-bezier(.34,1.56,.64,1); }
    .toggle input:checked ~ .track { background:var(--accent-d); border-color:var(--accent); box-shadow:0 0 12px var(--accent-g); }
    .toggle input:checked ~ .track .thumb { left:23px; background:var(--accent); }
    .toggle input:focus-visible ~ .track { outline:2px solid var(--accent); outline-offset:2px; }

    /* Status */
    .status { margin:16px 20px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); display:flex; align-items:center; gap:10px; transition:all .3s; }
    .status.on  { border-color:var(--accent); background:var(--accent-d); }
    .status.err { border-color:var(--danger);  background:#ff475710; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); flex-shrink:0; }
    .status.on .dot { background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s infinite; }
    .status.err .dot { background:var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .stxt { font-size:12px; font-weight:500; color:var(--muted); font-family:var(--mono); }
    .status.on .stxt { color:var(--accent); }

    /* Sections */
    .sec { padding:0 20px 16px; }
    .sec-lbl { font-size:9px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }

    /* Protocol buttons */
    .ptypes { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px; }
    .pt { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:8px 4px; color:var(--muted); font-family:var(--mono); font-size:11px; font-weight:500; cursor:pointer; transition:all .18s; }
    .pt:hover { border-color:var(--border2); color:var(--text); }
    .pt.on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }
    .pt:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

    /* Fields */
    .fr { display:grid; grid-template-columns:1fr auto; gap:8px; margin-bottom:8px; }
    .fr.half { grid-template-columns:1fr 1fr; }
    .field { display:flex; flex-direction:column; gap:4px; }
    .field label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
    .field input { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:9px 11px; color:var(--text); font-family:var(--mono); font-size:12px; outline:none; transition:border-color .18s; width:100%; }
    .field input:focus { border-color:var(--accent); }
    .field input::placeholder { color:var(--dim); }
    .port { width:90px; }

    /* Divider */
    .div { display:flex; align-items:center; gap:10px; margin:4px 0 10px; }
    .div span { font-size:9px; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; flex-shrink:0; }
    .dl { flex:1; height:1px; background:var(--border); }

    /* FIX 3: leak prevention — data-key values now match background.js exactly */
    .lgrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    /* FIX 6: leak items are buttons for keyboard access */
    .li {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
      padding:9px 11px; cursor:pointer; transition:all .18s;
      text-align:left; font-family:var(--sans);
    }
    .li:hover { border-color:var(--border2); }
    .li[aria-pressed="true"]  { border-color:var(--accent); background:var(--accent-d); }
    .li:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .ln { font-size:11px; font-weight:600; color:var(--text); }
    .ld { font-size:9px;  color:var(--muted); margin-top:2px; }
    .lck { width:14px; height:14px; border:1px solid var(--border2); border-radius:4px; flex-shrink:0; margin-left:8px; display:flex; align-items:center; justify-content:center; font-size:9px; transition:all .18s; }
    .li[aria-pressed="true"] .lck { background:var(--accent); border-color:var(--accent); color:var(--bg); }

    /* Actions */
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 20px 10px; }
    .btn { padding:10px; border-radius:var(--r); font-family:var(--sans); font-size:12px; font-weight:600; cursor:pointer; border:none; transition:all .18s; }
    .btn-p { background:var(--accent); color:var(--bg); }
    .btn-p:hover { background:#00e0ab; box-shadow:0 4px 16px var(--accent-g); }
    .btn-s { background:var(--surface2); color:var(--muted); border:1px solid var(--border2); }
    .btn-s:hover { color:var(--text); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

    /* FIX 4: inline validate result — persistent, not a vanishing toast */
    .val-box { display:none; margin:0 20px 12px; padding:9px 12px; border-radius:var(--r); font-size:11px; line-height:1.5; }
    .val-box.ok  { display:block; background:var(--accent-d); border:1px solid var(--accent); color:var(--accent); }
    .val-box.err { display:block; background:#ff475710;       border:1px solid var(--danger);  color:var(--danger); }

    /* Footer */
    .footer { padding:0 20px 16px; display:flex; justify-content:space-between; align-items:center; }
    .footer a { font-size:11px; color:var(--dim); text-decoration:none; transition:color .18s; }
    .footer a:hover { color:var(--accent); }
    .footer a:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:2px; }
    .ver { font-family:var(--mono); font-size:10px; color:var(--dim); }

    /* Toast */
    .toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r); padding:9px 16px; font-size:12px; font-weight:500; color:var(--text); white-space:nowrap; transition:transform .3s cubic-bezier(.34,1.56,.64,1); z-index:100; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.ok  { border-color:var(--accent); color:var(--accent); }
    .toast.err { border-color:var(--danger);  color:var(--danger); }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="brand">
    <div class="brand-icon" aria-hidden="true">🛡</div>
    <div>
      <div class="brand-name">ProxyShield</div>
      <div class="brand-tag">DNS Leak Protected</div>
    </div>
  </div>
  <div class="tw">
    <span class="tl" id="tl" aria-hidden="true">OFF</span>
    <label class="toggle" aria-label="Enable proxy">
      <input type="checkbox" id="master" role="switch" aria-checked="false" />
      <div class="track"><div class="thumb"></div></div>
    </label>
  </div>
</div>

<div class="status" id="status" role="status" aria-live="polite">
  <div class="dot" aria-hidden="true"></div>
  <span class="stxt" id="stxt">No proxy configured</span>
</div>

<div class="sec">
  <div class="sec-lbl">Protocol</div>
  <div class="ptypes" role="group" aria-label="Proxy protocol">
    <button class="pt on"  data-type="http"   aria-pressed="true">HTTP</button>
    <button class="pt"     data-type="https"  aria-pressed="false">HTTPS</button>
    <button class="pt"     data-type="socks4" aria-pressed="false">SOCKS4</button>
    <button class="pt"     data-type="socks5" aria-pressed="false">SOCKS5</button>
  </div>
  <div class="fr">
    <div class="field">
      <label for="host">Proxy Host</label>
      <input id="host" type="text" placeholder="192.168.1.1 or proxy.example.com" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field port">
      <label for="port">Port</label>
      <input id="port" type="number" placeholder="1080" min="1" max="65535" />
    </div>
  </div>
  <div class="div" aria-hidden="true"><div class="dl"></div><span>Auth (optional)</span><div class="dl"></div></div>
  <div class="fr half">
    <div class="field"><label for="user">Username</label><input id="user" type="text" placeholder="username" autocomplete="off" /></div>
    <div class="field"><label for="pass">Password</label><input id="pass" type="password" placeholder="••••••••" autocomplete="off" /></div>
  </div>
</div>

<!-- FIX 3: data-key names match background.js keys. proxyDns removed (not a
     real toggle — SOCKS5 always uses remote DNS with fixed_servers).
     blockUdp renamed blockReferrers. blockHyperlinkAudit is now surfaced. -->
<div class="sec">
  <div class="sec-lbl">Leak Prevention</div>
  <div class="lgrid">
    <button class="li" data-key="webrtc" aria-pressed="true">
      <div><div class="ln">WebRTC</div><div class="ld">Block real-IP via peers</div></div>
      <div class="lck" aria-hidden="true">✓</div>
    </button>
    <button class="li" data-key="dnsPrefetch" aria-pressed="true">
      <div><div class="ln">DNS Prefetch</div><div class="ld">Stop local pre-resolving</div></div>
      <div class="lck" aria-hidden="true">✓</div>
    </button>
    <button class="li" data-key="blockHyperlinkAudit" aria-pressed="true">
      <div><div class="ln">Ping Audit</div><div class="ld">Disable &lt;a ping&gt; beacons</div></div>
      <div class="lck" aria-hidden="true">✓</div>
    </button>
    <button class="li" data-key="blockReferrers" aria-pressed="true">
      <div><div class="ln">Referrers</div><div class="ld">Hide origin headers</div></div>
      <div class="lck" aria-hidden="true">✓</div>
    </button>
  </div>
</div>

<div class="actions">
  <button class="btn btn-p" id="btn-save">Save &amp; Apply</button>
  <!-- FIX 4: renamed from "Test Config" — this validates format, not connectivity -->
  <button class="btn btn-s" id="btn-validate">Validate Config</button>
</div>

<!-- FIX 4: inline result box (not a toast) so the message persists while user reads it -->
<div class="val-box" id="val-box" role="alert" aria-live="polite"></div>

<div class="footer">
  <a href="#" id="opts">⚙ Profiles &amp; Options</a>
  <span class="ver">v1.1.0</span>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script src="src/popup.js"></script>
</body>
</html>
